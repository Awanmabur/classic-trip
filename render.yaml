services:
  - type: web
    name: classic-trip
    runtime: node
    plan: free
    region: oregon
    branch: master
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_NAME
        value: Classic Trip
      - key: APP_URL
        sync: false
      - key: SITE_URL
        sync: false
      - key: DEMO_MODE
        value: "false"
      - key: ALLOW_DEMO_LOGIN
        value: "false"
      - key: DEMO_PASSWORD
        sync: false
      - key: MONGO_URI
        sync: false
      - key: MONGO_TRANSACTIONS
        value: "true"
      - key: SESSION_SECRET
        generateValue: true
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: SUPER_ADMIN_NAME
        sync: false
      - key: SUPER_ADMIN_PHONE
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: classic-trip
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: PAYMENT_PROVIDER
        value: pesapal
      - key: ALLOW_MOCK_PAYMENTS
        value: "false"
      - key: PAYMENT_WEBHOOK_SECRET
        generateValue: true
      - key: PESAPAL_API_URL
        value: https://pay.pesapal.com/v3/api
      - key: PESAPAL_CONSUMER_KEY
        sync: false
      - key: PESAPAL_CONSUMER_SECRET
        sync: false
      - key: PESAPAL_CALLBACK_URL
        sync: false
      - key: PESAPAL_IPN_URL
        sync: false
      - key: PESAPAL_IPN_ID
        sync: false
      - key: PESAPAL_WEBHOOK_SECRET
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: WHATSAPP_API_URL
        sync: false
      - key: WHATSAPP_API_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: PUSH_ENABLED
        value: "false"
      - key: PUSH_VAPID_PUBLIC_KEY
        sync: false
      - key: PUSH_VAPID_PRIVATE_KEY
        sync: false
      - key: ENABLE_JOBS
        value: "true"
