name: Keep Render app awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          URL="${{ vars.RENDER_APP_URL }}/health"
          if [ -z "${{ vars.RENDER_APP_URL }}" ]; then
            echo "RENDER_APP_URL repository variable is not set. Skipping ping."
            exit 0
          fi
          echo "Pinging $URL"
          curl -sf --max-time 20 "$URL" || echo "Ping failed (app may be waking up); this is non-fatal."
